name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    uses: CheFu-code/CheFu-UI/.github/workflows/node-ci.yml@main
    with:
      smoke-command: npm run smoke
